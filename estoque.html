                                </div>

                                <div>
                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                        Pessoa de Contato
                                    </label>
                                    <input
                                        type="text"
                                        className="input"
                                        value={formData.contact}
                                        onChange={(e) => setFormData({ ...formData, contact: e.target.value })}
                                        required
                                    />
                                </div>

                                <div>
                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                        E-mail
                                    </label>
                                    <input
                                        type="email"
                                        className="input"
                                        value={formData.email}
                                        onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                                        required
                                    />
                                </div>

                                <div>
                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                        Telefone
                                    </label>
                                    <input
                                        type="tel"
                                        className="input"
                                        value={formData.phone}
                                        onChange={(e) => setFormData({ ...formData, phone: e.target.value })}
                                        required
                                    />
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end', marginTop: '1.5rem' }}>
                                <button type="button" className="btn btn-outline" onClick={() => setIsFormOpen(false)}>
                                    Cancelar
                                </button>
                                <button type="submit" className="btn btn-primary">
                                    Salvar
                                </button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={deleteDialogOpen} onClose={() => setDeleteDialogOpen(false)} title="Confirmar exclusão">
                        <p style={{ marginBottom: '1.5rem' }}>Tem certeza que deseja excluir este fornecedor? Esta ação não pode ser desfeita.</p>
                        <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end' }}>
                            <button className="btn btn-outline" onClick={() => setDeleteDialogOpen(false)}>
                                Cancelar
                            </button>
                            <button className="btn btn-primary" onClick={confirmDelete}>
                                Excluir
                            </button>
                        </div>
                    </Modal>
                </div>
            );
        }

        // ================== COMPONENTE PRINCIPAL APP ==================
        function App() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [products, setProducts] = useLocalStorage('inventory-products', initialProducts);
            const [suppliers, setSuppliers] = useLocalStorage('inventory-suppliers', initialSuppliers);
            const [sales, setSales] = useLocalStorage('inventory-sales', []);
            const [toast, setToast] = useState({ show: false, message: '' });

            const showToast = (message) => {
                setToast({ show: true, message });
            };

            // Produto handlers
            const handleAddProduct = (productData) => {
                const newProduct = {
                    ...productData,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                };
                setProducts([...products, newProduct]);
                showToast('Produto adicionado com sucesso!');
            };

            const handleUpdateProduct = (id, productData) => {
                setProducts(products.map(p => 
                    p.id === id 
                        ? { ...productData, id, createdAt: p.createdAt, updatedAt: new Date().toISOString() }
                        : p
                ));
                showToast('Produto atualizado com sucesso!');
            };

            const handleDeleteProduct = (id) => {
                setProducts(products.filter(p => p.id !== id));
                showToast('Produto excluído com sucesso!');
            };

            // Fornecedor handlers
            const handleAddSupplier = (supplierData) => {
                const newSupplier = {
                    ...supplierData,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                };
                setSuppliers([...suppliers, newSupplier]);
                showToast('Fornecedor adicionado com sucesso!');
            };

            const handleUpdateSupplier = (id, supplierData) => {
                setSuppliers(suppliers.map(s => 
                    s.id === id 
                        ? { ...supplierData, id, createdAt: s.createdAt }
                        : s
                ));
                showToast('Fornecedor atualizado com sucesso!');
            };

            const handleDeleteSupplier = (id) => {
                setSuppliers(suppliers.filter(s => s.id !== id));
                showToast('Fornecedor excluído com sucesso!');
            };

            // Venda handlers
            const handleAddSale = (saleData) => {
                const newSale = {
                    ...saleData,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                };

                // Atualizar estoque do produto
                setProducts(products.map(p => 
                    p.id === saleData.productId 
                        ? { ...p, quantity: p.quantity - saleData.quantity, updatedAt: new Date().toISOString() }
                        : p
                ));

                // Adicionar venda
                setSales([...sales, newSale]);
                showToast('Venda registrada com sucesso!');
            };

            const navigation = [
                { name: 'Dashboard', id: 'dashboard', icon: Icons.Dashboard },
                { name: 'Produtos', id: 'products', icon: Icons.Package },
                { name: 'Vendas', id: 'sales', icon: Icons.ShoppingCart },
                { name: 'Fornecedores', id: 'suppliers', icon: Icons.Users },
            ];

            const renderPage = () => {
                switch (currentPage) {
                    case 'products':
                        return (
                            <Products
                                products={products}
                                suppliers={suppliers}
                                onAddProduct={handleAddProduct}
                                onUpdateProduct={handleUpdateProduct}
                                onDeleteProduct={handleDeleteProduct}
                            />
                        );
                    case 'sales':
                        return (
                            <Sales
                                sales={sales}
                                products={products}
                                onAddSale={handleAddSale}
                            />
                        );
                    case 'suppliers':
                        return (
                            <Suppliers
                                suppliers={suppliers}
                                products={products}
                                onAddSupplier={handleAddSupplier}
                                onUpdateSupplier={handleUpdateSupplier}
                                onDeleteSupplier={handleDeleteSupplier}
                            />
                        );
                    default:
                        return <Dashboard products={products} suppliers={suppliers} sales={sales} />;
                }
            };

            return (
                <div>
                    {/* Mobile Header */}
                    <div className="lg:hidden" style={{ borderBottom: '1px solid var(--border)', backgroundColor: 'var(--card)' }}>
                        <div style={{ display: 'flex', height: '4rem', alignItems: 'center', padding: '0 1rem' }}>
                            <button 
                                className="btn btn-outline" 
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                style={{ padding: '0.5rem' }}
                            >
                                <Icons.Menu />
                            </button>
                            <h1 style={{ marginLeft: '1rem', fontSize: '1.125rem', fontWeight: '600' }}>Controle de Estoque Closet da Iza</h1>
                        </div>
                    </div>

                    {/* Mobile Sidebar */}
                    {mobileMenuOpen && (
                        <div className="sidebar lg:hidden open" style={{ zIndex: 40 }}>
                            <div style={{ padding: '1rem' }}>
                                <h2 style={{ marginBottom: '1rem', padding: '0 0.75rem', fontSize: '1.125rem', fontWeight: '600' }}>
                                    Controle de Estoque
                                </h2>
                                <nav style={{ display: 'grid', gap: '0.25rem' }}>
                                    {navigation.map(item => {
                                        const Icon = item.icon;
                                        return (
                                            <div
                                                key={item.id}
                                                className={`nav-link ${currentPage === item.id ? 'active' : ''}`}
                                                onClick={() => {
                                                    setCurrentPage(item.id);
                                                    setMobileMenuOpen(false);
                                                }}
                                            >
                                                <Icon />
                                                <span>{item.name}</span>
                                            </div>
                                        );
                                    })}
                                </nav>
                            </div>
                        </div>
                    )}

                    <div style={{ display: 'grid', gridTemplateColumns: '250px 1fr' }} className="lg:grid">
                        {/* Desktop Sidebar */}
                        <div className="sidebar hidden lg:block">
                            <div style={{ display: 'flex', height: '100%', flexDirection: 'column' }}>
                                <div style={{ display: 'flex', height: '4rem', alignItems: 'center', borderBottom: '1px solid var(--border)', padding: '0 1.5rem' }}>
                                    <h1 style={{ fontSize: '1.25rem', fontWeight: 'bold' }}>Controle de Estoque</h1>
                                </div>
                                <nav style={{ flex: 1, display: 'grid', gap: '0.25rem', padding: '1rem' }}>
                                    {navigation.map(item => {
                                        const Icon = item.icon;
                                        return (
                                            <div
                                                key={item.id}
                                                className={`nav-link ${currentPage === item.id ? 'active' : ''}`}
                                                onClick={() => setCurrentPage(item.id)}
                                            >
                                                <Icon />
                                                <span>{item.name}</span>
                                            </div>
                                        );
                                    })}
                                </nav>
                                <div style={{ borderTop: '1px solid var(--border)', padding: '1rem' }}>
                                    <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)' }}>
                                        Sistema de Gestão de Roupas
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Main Content */}
                        <main className="main-content">
                            {renderPage()}
                        </main>
                    </div>

                    <Toast 
                        show={toast.show} 
                        message={toast.message} 
                        onClose={() => setToast({ show: false, message: '' })} 
                    />

                    <style>{`
                        @media (min-width: 1024px) {
                            .hidden { display: none; }
                            .lg\\:block { display: block !important; }
                            .lg\\:grid { display: grid !important; }
                            .lg\\:hidden { display: none !important; }
                        }
                    `}</style>
                </div>
            );
        }

        // ================== RENDERIZAÇÃO ==================
        // Aguarda carregamento de dependências antes de renderizar
        setTimeout(() => {
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } catch (error) {
                console.error('Erro ao renderizar aplicação:', error);
                document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red;">Erro ao carregar a aplicação. Recarregue a página.</div>';
            }
        }, 1000);
    </script>
</body>
</html>
