<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque de Roupas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/dist/Recharts.js"></script>
    
    <!-- Date-fns -->
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.0.0/index.min.js"></script>
    
    <style>
        :root {
            --primary: #d4a574;
            --secondary: #ffc9d4;
            --background: #ffffff;
            --foreground: #0a0a0a;
            --card: #ffffff;
            --card-foreground: #0a0a0a;
            --border: #e5e7eb;
            --input: #e5e7eb;
            --accent: #f3f4f6;
            --accent-foreground: #0a0a0a;
            --muted: #f9fafb;
            --muted-foreground: #6b7280;
            --destructive: #ef4444;
        }
        
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--background);
            color: var(--foreground);
        }
        
        * {
            box-sizing: border-box;
        }
        
        .gradient-text {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-secondary {
            background-color: var(--secondary);
            color: #0a0a0a;
        }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--foreground);
        }
        
        .btn-outline:hover {
            background-color: var(--accent);
        }
        
        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        
        .input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }
        
        .input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            max-width: 42rem;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th,
        .table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .table th {
            font-weight: 600;
            color: var(--muted-foreground);
            font-size: 0.875rem;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-default {
            background-color: var(--primary);
            color: white;
        }
        
        .badge-secondary {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .badge-destructive {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .sidebar {
            background-color: var(--card);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            overflow-y: auto;
        }
        
        .main-content {
            margin-left: 250px;
            padding: 2rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted-foreground);
            text-decoration: none;
        }
        
        .nav-link:hover {
            background-color: var(--accent);
        }
        
        .nav-link.active {
            background-color: var(--accent);
            color: var(--accent-foreground);
        }
        
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background-color: white;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 100;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            background-color: white;
        }
        
        .select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Recharts_Module = window.Recharts || {};
        const { 
            ResponsiveContainer = null, 
            LineChart = null, 
            Line = null, 
            PieChart = null, 
            Pie = null, 
            Cell = null, 
            XAxis = null, 
            YAxis = null, 
            CartesianGrid = null, 
            Tooltip = null, 
            Legend = null 
        } = Recharts_Module;

        // ================== UTILITÁRIOS ==================
        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL',
            }).format(value);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', { 
                day: '2-digit', 
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Hook para localStorage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };

            return [storedValue, setValue];
        }

        // ================== COMPONENTES DE UI ==================
        function Toast({ message, show, onClose }) {
            useEffect(() => {
                if (show) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [show, onClose]);

            if (!show) return null;

            return (
                <div className="toast">
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="10" r="9" stroke="#22c55e" strokeWidth="2"/>
                            <path d="M6 10l3 3 5-6" stroke="#22c55e" strokeWidth="2" fill="none"/>
                        </svg>
                        <span>{message}</span>
                    </div>
                </div>
            );
        }

        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div style={{ marginBottom: '1.5rem' }}>
                            <h2 style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>{title}</h2>
                        </div>
                        {children}
                    </div>
                </div>
            );
        }

        // ================== ÍCONES SVG ==================
        const Icons = {
            Menu: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            ),
            Dashboard: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                </svg>
            ),
            Package: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            ),
            ShoppingCart: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
            ),
            Users: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            ),
            Plus: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            ),
            Edit: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            ),
            Trash: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
            ),
            Search: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            ),
            DollarSign: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            ),
            TrendingUp: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                    <polyline points="17 6 23 6 23 12"/>
                </svg>
            ),
            AlertTriangle: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            ),
            Sparkles: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                </svg>
            ),
        };

        // ================== DADOS INICIAIS ==================
        const initialSuppliers = [
            {
                id: '1',
                name: 'Confecções Modernas Ltda',
                contact: 'João Silva',
                email: 'contato@confeccoesmodernas.com',
                phone: '(11) 98765-4321',
                createdAt: new Date().toISOString(),
            },
            {
                id: '2',
                name: 'Tecidos e Cia',
                contact: 'Maria Santos',
                email: 'vendas@tecidosecia.com',
                phone: '(11) 97654-3210',
                createdAt: new Date().toISOString(),
            },
        ];

        const initialProducts = [
            {
                id: '1',
                name: 'Camiseta Básica Branca',
                category: 'Camisetas',
                size: 'M',
                color: 'Branco',
                quantity: 50,
                costPrice: 15.00,
                salePrice: 39.90,
                supplierId: '1',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            },
            {
                id: '2',
                name: 'Calça Jeans Skinny',
                category: 'Calças',
                size: 'M',
                color: 'Azul',
                quantity: 30,
                costPrice: 45.00,
                salePrice: 129.90,
                supplierId: '1',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            },
            {
                id: '3',
                name: 'Vestido Floral',
                category: 'Vestidos',
                size: 'P',
                color: 'Rosa',
                quantity: 8,
                costPrice: 60.00,
                salePrice: 159.90,
                supplierId: '2',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            },
            {
                id: '4',
                name: 'Jaqueta Jeans',
                category: 'Jaquetas',
                size: 'G',
                color: 'Azul Escuro',
                quantity: 15,
                costPrice: 80.00,
                salePrice: 199.90,
                supplierId: '2',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            },
        ];

        // ================== COMPONENTE DASHBOARD ==================
        function Dashboard({ products, suppliers, sales }) {
            const stats = useMemo(() => {
                const totalProducts = products.reduce((sum, p) => sum + p.quantity, 0);
                const totalInvested = products.reduce((sum, p) => sum + (p.costPrice * p.quantity), 0);
                const totalValue = products.reduce((sum, p) => sum + (p.salePrice * p.quantity), 0);
                const potentialProfit = totalValue - totalInvested;
                const lowStockProducts = products.filter(p => p.quantity < 10);
                const totalRevenue = sales.reduce((sum, s) => sum + s.totalPrice, 0);
                const totalSales = sales.length;
                
                return {
                    totalProducts,
                    totalInvested,
                    totalValue,
                    potentialProfit,
                    lowStockProducts,
                    suppliersCount: suppliers.length,
                    totalRevenue,
                    totalSales,
                };
            }, [products, suppliers, sales]);

            const categoryData = useMemo(() => {
                const categories = products.reduce((acc, product) => {
                    if (!acc[product.category]) {
                        acc[product.category] = 0;
                    }
                    acc[product.category] += product.quantity;
                    return acc;
                }, {});

                return Object.entries(categories).map(([name, value]) => ({ name, value }));
            }, [products]);

            const salesByDay = useMemo(() => {
                const last7Days = Array.from({ length: 7 }, (_, i) => {
                    const date = new Date();
                    date.setDate(date.getDate() - (6 - i));
                    return date;
                });

                return last7Days.map(date => {
                    const dateStr = date.toISOString().split('T')[0];
                    const daySales = sales.filter(s => {
                        const saleDate = new Date(s.createdAt).toISOString().split('T')[0];
                        return saleDate === dateStr;
                    });
                    
                    const total = daySales.reduce((sum, s) => sum + s.totalPrice, 0);
                    
                    return {
                        date: date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
                        vendas: total,
                        quantidade: daySales.length,
                    };
                });
            }, [sales]);

            const topProducts = useMemo(() => {
                return [...products]
                    .sort((a, b) => (b.salePrice * b.quantity) - (a.salePrice * a.quantity))
                    .slice(0, 5);
            }, [products]);

            const COLORS = ['#d4a574', '#ffc9d4', '#b8860b', '#ffb6c1', '#daa520', '#e8c5a8'];

            return (
                <div style={{ display: 'grid', gap: '1.5rem' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                        <Icons.Sparkles />
                        <div>
                            <h1 className="gradient-text" style={{ fontSize: '2.25rem', fontWeight: 'bold' }}>
                                Dashboard
                            </h1>
                            <p style={{ color: 'var(--muted-foreground)' }}>
                                Visão geral do seu estoque e vendas
                            </p>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gap: '1rem', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))' }}>
                        <div className="card" style={{ background: 'linear-gradient(to bottom right, rgba(212, 165, 116, 0.1), rgba(212, 165, 116, 0.05))', borderColor: 'rgba(212, 165, 116, 0.2)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Total de Peças</div>
                                <Icons.Package />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)' }}>{stats.totalProducts}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Quantidade em estoque</p>
                        </div>

                        <div className="card" style={{ background: 'linear-gradient(to bottom right, rgba(255, 201, 212, 0.1), rgba(255, 201, 212, 0.05))', borderColor: 'rgba(255, 201, 212, 0.2)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Valor Investido</div>
                                <Icons.DollarSign />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: '#d4a574' }}>{formatCurrency(stats.totalInvested)}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Capital no estoque</p>
                        </div>

                        <div className="card" style={{ background: 'linear-gradient(to bottom right, rgba(212, 165, 116, 0.1), rgba(255, 201, 212, 0.1))', borderColor: 'rgba(212, 165, 116, 0.2)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Total de Vendas</div>
                                <Icons.ShoppingCart />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)' }}>{formatCurrency(stats.totalRevenue)}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>{stats.totalSales} vendas realizadas</p>
                        </div>

                        <div className="card" style={{ background: 'linear-gradient(to bottom right, rgba(255, 201, 212, 0.2), rgba(212, 165, 116, 0.2))', borderColor: 'rgba(212, 165, 116, 0.3)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Lucro Potencial</div>
                                <Icons.TrendingUp />
                            </div>
                            <div className="gradient-text" style={{ fontSize: '2rem', fontWeight: 'bold' }}>{formatCurrency(stats.potentialProfit)}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Margem de lucro total</p>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gap: '1rem', gridTemplateColumns: 'repeat(auto-fit, minmax(400px, 1fr))' }}>
                        <div className="card">
                            <h3 style={{ fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <Icons.TrendingUp />
                                Vendas dos Últimos 7 Dias
                            </h3>
                            {ResponsiveContainer ? (
                                <ResponsiveContainer width="100%" height={300}>
                                    <LineChart data={salesByDay}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#d4a574" opacity={0.2} />
                                        <XAxis dataKey="date" stroke="#8b7266" />
                                        <YAxis stroke="#8b7266" />
                                        <Tooltip 
                                            contentStyle={{ 
                                                backgroundColor: '#fff', 
                                                border: '1px solid #d4a574', 
                                                borderRadius: '8px' 
                                            }}
                                            formatter={(value) => formatCurrency(value)}
                                        />
                                        <Line 
                                            type="monotone" 
                                            dataKey="vendas" 
                                            stroke="#d4a574" 
                                            strokeWidth={3} 
                                            dot={{ fill: '#d4a574', r: 5 }} 
                                        />
                                    </LineChart>
                                </ResponsiveContainer>
                            ) : (
                                <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--muted-foreground)', minHeight: '300px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                    Carregando gráfico...
                                </div>
                            )}
                        </div>

                        <div className="card">
                            <h3 style={{ fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <Icons.Package />
                                Distribuição por Categoria
                            </h3>
                            {ResponsiveContainer ? (
                                <ResponsiveContainer width="100%" height={300}>
                                    <PieChart>
                                        <Pie
                                            data={categoryData}
                                            cx="50%"
                                            cy="50%"
                                            labelLine={false}
                                            label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}
                                            outerRadius={80}
                                            fill="#8884d8"
                                            dataKey="value"
                                        >
                                            {categoryData.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <Tooltip />
                                    <Legend />
                                </PieChart>
                                </ResponsiveContainer>
                            ) : (
                                <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--muted-foreground)', minHeight: '300px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                    Carregando gráfico...
                                </div>
                            )}
                        </div>
                    </div>

                    <div style={{ display: 'grid', gap: '1rem', gridTemplateColumns: 'repeat(auto-fit, minmax(400px, 1fr))' }}>
                        <div className="card">
                            <h3 style={{ fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem' }}>Produtos com Maior Valor</h3>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Produto</th>
                                        <th>Quantidade</th>
                                        <th style={{ textAlign: 'right' }}>Valor Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {topProducts.length > 0 ? topProducts.map(product => (
                                        <tr key={product.id}>
                                            <td>
                                                <div style={{ fontWeight: '500' }}>{product.name}</div>
                                                <div style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>
                                                    {product.category} • {product.size} • {product.color}
                                                </div>
                                            </td>
                                            <td>{product.quantity}</td>
                                            <td style={{ textAlign: 'right', fontWeight: '600', color: 'var(--primary)' }}>
                                                {formatCurrency(product.salePrice * product.quantity)}
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="3" style={{ textAlign: 'center', color: 'var(--muted-foreground)' }}>
                                                Nenhum produto cadastrado
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>

                        <div className="card">
                            <h3 style={{ fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <Icons.AlertTriangle />
                                Estoque Baixo
                            </h3>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Produto</th>
                                        <th style={{ textAlign: 'right' }}>Quantidade</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {stats.lowStockProducts.length > 0 ? stats.lowStockProducts.slice(0, 5).map(product => (
                                        <tr key={product.id}>
                                            <td>
                                                <div style={{ fontWeight: '500' }}>{product.name}</div>
                                                <div style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>
                                                    {product.category} • {product.size} • {product.color}
                                                </div>
                                            </td>
                                            <td style={{ textAlign: 'right' }}>
                                                <span className={`badge ${product.quantity === 0 ? 'badge-destructive' : 'badge-secondary'}`}>
                                                    {product.quantity}
                                                </span>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="2" style={{ textAlign: 'center', color: 'var(--muted-foreground)' }}>
                                                Nenhum produto com estoque baixo
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ================== COMPONENTE PRODUTOS ==================
        function Products({ products, suppliers, onAddProduct, onUpdateProduct, onDeleteProduct }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('all');
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [deleteDialogOpen, setDeleteDialogOpen] = useState(false);
            const [productToDelete, setProductToDelete] = useState(null);

            const [formData, setFormData] = useState({
                name: '',
                category: 'Camisetas',
                size: 'M',
                color: '',
                quantity: 0,
                costPrice: 0,
                salePrice: 0,
                supplierId: suppliers[0]?.id || '',
            });

            const categories = ['all', 'Camisetas', 'Calças', 'Vestidos', 'Saias', 'Jaquetas', 'Shorts', 'Acessórios', 'Outros'];
            const sizes = ['PP', 'P', 'M', 'G', 'GG', 'XG', 'Único'];

            const filteredProducts = useMemo(() => {
                return products.filter((product) => {
                    const matchesSearch = 
                        product.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        product.color.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        product.category.toLowerCase().includes(searchTerm.toLowerCase());
                    
                    const matchesCategory = categoryFilter === 'all' || product.category === categoryFilter;

                    return matchesSearch && matchesCategory;
                });
            }, [products, searchTerm, categoryFilter]);

            const handleEdit = (product) => {
                setEditingProduct(product);
                setFormData({
                    name: product.name,
                    category: product.category,
                    size: product.size,
                    color: product.color,
                    quantity: product.quantity,
                    costPrice: product.costPrice,
                    salePrice: product.salePrice,
                    supplierId: product.supplierId,
                });
                setIsFormOpen(true);
            };

            const handleDelete = (id) => {
                setProductToDelete(id);
                setDeleteDialogOpen(true);
            };

            const confirmDelete = () => {
                if (productToDelete) {
                    onDeleteProduct(productToDelete);
                    setDeleteDialogOpen(false);
                    setProductToDelete(null);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingProduct) {
                    onUpdateProduct(editingProduct.id, formData);
                } else {
                    onAddProduct(formData);
                }
                setIsFormOpen(false);
                setEditingProduct(null);
                setFormData({
                    name: '',
                    category: 'Camisetas',
                    size: 'M',
                    color: '',
                    quantity: 0,
                    costPrice: 0,
                    salePrice: 0,
                    supplierId: suppliers[0]?.id || '',
                });
            };

            const getSupplierName = (supplierId) => {
                return suppliers.find(s => s.id === supplierId)?.name || 'Desconhecido';
            };

            return (
                <div style={{ display: 'grid', gap: '1.5rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                            <h1 style={{ fontSize: '1.875rem', fontWeight: 'bold' }}>Produtos</h1>
                            <p style={{ color: 'var(--muted-foreground)' }}>Gerencie seu estoque de roupas</p>
                        </div>
                        <button className="btn btn-primary" onClick={() => setIsFormOpen(true)}>
                            <Icons.Plus />
                            Novo Produto
                        </button>
                    </div>

                    <div className="card">
                        <h3 style={{ fontSize: '1.125rem', fontWeight: 'bold', marginBottom: '1rem' }}>Filtros</h3>
                        <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
                            <div style={{ flex: '1', minWidth: '250px', position: 'relative' }}>
                                <div style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--muted-foreground)' }}>
                                    <Icons.Search />
                                </div>
                                <input
                                    type="text"
                                    className="input"
                                    placeholder="Buscar produtos..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    style={{ paddingLeft: '2.5rem' }}
                                />
                            </div>
                            <select
                                className="select"
                                value={categoryFilter}
                                onChange={(e) => setCategoryFilter(e.target.value)}
                                style={{ minWidth: '200px' }}
                            >
                                {categories.map(cat => (
                                    <option key={cat} value={cat}>
                                        {cat === 'all' ? 'Todas as Categorias' : cat}
                                    </option>
                                ))}
                            </select>
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{ fontSize: '1.125rem', fontWeight: 'bold', marginBottom: '1rem' }}>
                            Lista de Produtos ({filteredProducts.length})
                        </h3>
                        <div style={{ overflowX: 'auto' }}>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Produto</th>
                                        <th>Categoria</th>
                                        <th>Tamanho</th>
                                        <th>Cor</th>
                                        <th style={{ textAlign: 'right' }}>Quantidade</th>
                                        <th style={{ textAlign: 'right' }}>Preço Custo</th>
                                        <th style={{ textAlign: 'right' }}>Preço Venda</th>
                                        <th>Fornecedor</th>
                                        <th style={{ textAlign: 'right' }}>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredProducts.length > 0 ? filteredProducts.map(product => (
                                        <tr key={product.id}>
                                            <td style={{ fontWeight: '500' }}>{product.name}</td>
                                            <td>{product.category}</td>
                                            <td>{product.size}</td>
                                            <td>{product.color}</td>
                                            <td style={{ textAlign: 'right' }}>
                                                <span className={`badge ${product.quantity === 0 ? 'badge-destructive' : product.quantity < 10 ? 'badge-secondary' : 'badge-default'}`}>
                                                    {product.quantity}
                                                </span>
                                            </td>
                                            <td style={{ textAlign: 'right' }}>{formatCurrency(product.costPrice)}</td>
                                            <td style={{ textAlign: 'right' }}>{formatCurrency(product.salePrice)}</td>
                                            <td>{getSupplierName(product.supplierId)}</td>
                                            <td style={{ textAlign: 'right' }}>
                                                <div style={{ display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
                                                    <button
                                                        className="btn btn-outline"
                                                        onClick={() => handleEdit(product)}
                                                        style={{ padding: '0.25rem 0.5rem' }}
                                                    >
                                                        <Icons.Edit />
                                                    </button>
                                                    <button
                                                        className="btn btn-outline"
                                                        onClick={() => handleDelete(product.id)}
                                                        style={{ padding: '0.25rem 0.5rem', color: 'var(--destructive)' }}
                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="9" style={{ textAlign: 'center', color: 'var(--muted-foreground)', padding: '3rem' }}>
                                                Nenhum produto encontrado
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <Modal isOpen={isFormOpen} onClose={() => setIsFormOpen(false)} title={editingProduct ? 'Editar Produto' : 'Novo Produto'}>
                        <form onSubmit={handleSubmit}>
                            <div style={{ display: 'grid', gap: '1rem' }}>
                                <div>
                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                        Nome do Produto
                                    </label>
                                    <input
                                        type="text"
                                        className="input"
                                        value={formData.name}
                                        onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                        required
                                    />
                                </div>

                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                    <div>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                            Categoria
                                        </label>
                                        <select
                                            className="select"
                                            value={formData.category}
                                            onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        >
                                            {categories.filter(c => c !== 'all').map(cat => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                            Tamanho
                                        </label>
                                        <select
                                            className="select"
                                            value={formData.size}
                                            onChange={(e) => setFormData({ ...formData, size: e.target.value })}
                                        >
                                            {sizes.map(size => (
                                                <option key={size} value={size}>{size}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                    <div>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                            Cor
                                        </label>
                                        <input
                                            type="text"
                                            className="input"
                                            value={formData.color}
                                            onChange={(e) => setFormData({ ...formData, color: e.target.value })}
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                            Quantidade
                                        </label>
                                        <input
                                            type="number"
                                            className="input"
                                            min="0"
                                            value={formData.quantity}
                                            onChange={(e) => setFormData({ ...formData, quantity: parseInt(e.target.value) || 0 })}
                                            required
                                        />
                                    </div>
                                </div>

                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                    <div>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                            Preço de Custo (R$)
                                        </label>
                                        <input
                                            type="number"
                                            className="input"
                                            step="0.01"
                                            min="0"
                                            value={formData.costPrice}
                                            onChange={(e) => setFormData({ ...formData, costPrice: parseFloat(e.target.value) || 0 })}
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                            Preço de Venda (R$)
                                        </label>
                                        <input
                                            type="number"
                                            className="input"
                                            step="0.01"
                                            min="0"
                                            value={formData.salePrice}
                                            onChange={(e) => setFormData({ ...formData, salePrice: parseFloat(e.target.value) || 0 })}
                                            required
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                        Fornecedor
                                    </label>
                                    <select
                                        className="select"
                                        value={formData.supplierId}
                                        onChange={(e) => setFormData({ ...formData, supplierId: e.target.value })}
                                    >
                                        {suppliers.map(supplier => (
                                            <option key={supplier.id} value={supplier.id}>{supplier.name}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end', marginTop: '1.5rem' }}>
                                <button type="button" className="btn btn-outline" onClick={() => setIsFormOpen(false)}>
                                    Cancelar
                                </button>
                                <button type="submit" className="btn btn-primary">
                                    Salvar
                                </button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={deleteDialogOpen} onClose={() => setDeleteDialogOpen(false)} title="Confirmar exclusão">
                        <p style={{ marginBottom: '1.5rem' }}>Tem certeza que deseja excluir este produto? Esta ação não pode ser desfeita.</p>
                        <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end' }}>
                            <button className="btn btn-outline" onClick={() => setDeleteDialogOpen(false)}>
                                Cancelar
                            </button>
                            <button className="btn btn-primary" onClick={confirmDelete}>
                                Excluir
                            </button>
                        </div>
                    </Modal>
                </div>
            );
        }

        // ================== COMPONENTE VENDAS ==================
        function Sales({ sales, products, onAddSale }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [selectedProductId, setSelectedProductId] = useState('');
            const [quantity, setQuantity] = useState(1);

            const stats = useMemo(() => {
                const totalSales = sales.length;
                const totalRevenue = sales.reduce((sum, s) => sum + s.totalPrice, 0);
                const totalItems = sales.reduce((sum, s) => sum + s.quantity, 0);

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const todaySales = sales.filter(s => {
                    const saleDate = new Date(s.createdAt);
                    saleDate.setHours(0, 0, 0, 0);
                    return saleDate.getTime() === today.getTime();
                });
                const todayRevenue = todaySales.reduce((sum, s) => sum + s.totalPrice, 0);

                return {
                    totalSales,
                    totalRevenue,
                    totalItems,
                    todayRevenue,
                };
            }, [sales]);

            const sortedSales = useMemo(() => {
                return [...sales].sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
            }, [sales]);

            const availableProducts = products.filter(p => p.quantity > 0);
            const selectedProduct = products.find(p => p.id === selectedProductId);

            useEffect(() => {
                if (availableProducts.length > 0 && !selectedProductId) {
                    setSelectedProductId(availableProducts[0].id);
                }
            }, [availableProducts, selectedProductId]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!selectedProduct) return;

                const sale = {
                    productId: selectedProduct.id,
                    productName: `${selectedProduct.name} - ${selectedProduct.size} - ${selectedProduct.color}`,
                    quantity,
                    unitPrice: selectedProduct.salePrice,
                    totalPrice: selectedProduct.salePrice * quantity,
                };

                onAddSale(sale);
                setIsFormOpen(false);
                setQuantity(1);
            };

            return (
                <div style={{ display: 'grid', gap: '1.5rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                            <h1 style={{ fontSize: '1.875rem', fontWeight: 'bold' }}>Vendas</h1>
                            <p style={{ color: 'var(--muted-foreground)' }}>Registre e acompanhe suas vendas</p>
                        </div>
                        <button className="btn btn-primary" style={{ fontSize: '1.125rem', padding: '0.75rem 1.5rem' }} onClick={() => setIsFormOpen(true)}>
                            <Icons.Plus />
                            Nova Venda
                        </button>
                    </div>

                    <div style={{ display: 'grid', gap: '1rem', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))' }}>
                        <div className="card" style={{ borderColor: 'rgba(212, 165, 116, 0.2)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Total de Vendas</div>
                                <Icons.ShoppingCart />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)' }}>{stats.totalSales}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Vendas realizadas</p>
                        </div>

                        <div className="card" style={{ borderColor: 'rgba(212, 165, 116, 0.2)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Receita Total</div>
                                <Icons.DollarSign />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)' }}>{formatCurrency(stats.totalRevenue)}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Faturamento acumulado</p>
                        </div>

                        <div className="card" style={{ borderColor: 'rgba(212, 165, 116, 0.2)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Itens Vendidos</div>
                                <Icons.TrendingUp />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)' }}>{stats.totalItems}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Peças vendidas</p>
                        </div>

                        <div className="card" style={{ background: 'linear-gradient(to bottom right, rgba(255, 201, 212, 0.1), rgba(212, 165, 116, 0.1))', borderColor: 'rgba(255, 201, 212, 0.3)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <div style={{ fontSize: '0.875rem', fontWeight: '500' }}>Vendas Hoje</div>
                                <Icons.TrendingUp />
                            </div>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: '#d4a574' }}>{formatCurrency(stats.todayRevenue)}</div>
                            <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.25rem' }}>Faturamento do dia</p>
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{ fontSize: '1.125rem', fontWeight: 'bold', marginBottom: '1rem' }}>
                            Histórico de Vendas ({sortedSales.length})
                        </h3>
                        <div style={{ overflowX: 'auto' }}>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Data/Hora</th>
                                        <th>Produto</th>
                                        <th style={{ textAlign: 'right' }}>Quantidade</th>
                                        <th style={{ textAlign: 'right' }}>Preço Unit.</th>
                                        <th style={{ textAlign: 'right' }}>Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedSales.length > 0 ? sortedSales.map(sale => (
                                        <tr key={sale.id}>
                                            <td style={{ fontWeight: '500' }}>{formatDate(sale.createdAt)}</td>
                                            <td>{sale.productName}</td>
                                            <td style={{ textAlign: 'right' }}>{sale.quantity}</td>
                                            <td style={{ textAlign: 'right' }}>{formatCurrency(sale.unitPrice)}</td>
                                            <td style={{ textAlign: 'right', fontWeight: '600', color: 'var(--primary)' }}>
                                                {formatCurrency(sale.totalPrice)}
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="5" style={{ textAlign: 'center', color: 'var(--muted-foreground)', padding: '3rem' }}>
                                                Nenhuma venda registrada
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <Modal isOpen={isFormOpen} onClose={() => setIsFormOpen(false)} title="Registrar Venda">
                        <form onSubmit={handleSubmit}>
                            <div style={{ display: 'grid', gap: '1rem' }}>
                                {availableProducts.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: '2rem' }}>
                                        <p style={{ color: 'var(--muted-foreground)' }}>Nenhum produto disponível em estoque</p>
                                    </div>
                                ) : (
                                    <>
                                        <div>
                                            <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                                Produto
                                            </label>
                                            <select
                                                className="select"
                                                value={selectedProductId}
                                                onChange={(e) => setSelectedProductId(e.target.value)}
                                            >
                                                {availableProducts.map(product => (
                                                    <option key={product.id} value={product.id}>
                                                        {product.name} - {product.size} - {product.color} ({product.quantity} disponíveis)
                                                    </option>
                                                ))}
                                            </select>
                                        </div>

                                        {selectedProduct && (
                                            <>
                                                <div style={{ backgroundColor: 'rgba(212, 165, 116, 0.1)', padding: '1rem', borderRadius: '0.5rem' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                                                        <span style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>Preço Unitário:</span>
                                                        <span style={{ fontWeight: '600' }}>{formatCurrency(selectedProduct.salePrice)}</span>
                                                    </div>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                                        <span style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>Estoque Disponível:</span>
                                                        <span className="badge badge-secondary">{selectedProduct.quantity}</span>
                                                    </div>
                                                </div>

                                                <div>
                                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                                        Quantidade
                                                    </label>
                                                    <input
                                                        type="number"
                                                        className="input"
                                                        min="1"
                                                        max={selectedProduct.quantity}
                                                        value={quantity}
                                                        onChange={(e) => setQuantity(Math.min(parseInt(e.target.value) || 1, selectedProduct.quantity))}
                                                        required
                                                    />
                                                </div>

                                                <div style={{ backgroundColor: 'rgba(212, 165, 116, 0.1)', padding: '1rem', borderRadius: '0.5rem', border: '2px solid var(--primary)' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                        <span style={{ fontSize: '1.125rem', fontWeight: '600' }}>Valor Total:</span>
                                                        <span style={{ fontSize: '1.5rem', fontWeight: 'bold', color: 'var(--primary)' }}>
                                                            {formatCurrency(selectedProduct.salePrice * quantity)}
                                                        </span>
                                                    </div>
                                                </div>
                                            </>
                                        )}
                                    </>
                                )}
                            </div>

                            <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end', marginTop: '1.5rem' }}>
                                <button type="button" className="btn btn-outline" onClick={() => setIsFormOpen(false)}>
                                    Cancelar
                                </button>
                                <button type="submit" className="btn btn-primary" disabled={availableProducts.length === 0}>
                                    Registrar Venda
                                </button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        }

        // ================== COMPONENTE FORNECEDORES ==================
        function Suppliers({ suppliers, products, onAddSupplier, onUpdateSupplier, onDeleteSupplier }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingSupplier, setEditingSupplier] = useState(null);
            const [deleteDialogOpen, setDeleteDialogOpen] = useState(false);
            const [supplierToDelete, setSupplierToDelete] = useState(null);

            const [formData, setFormData] = useState({
                name: '',
                contact: '',
                email: '',
                phone: '',
            });

            const handleEdit = (supplier) => {
                setEditingSupplier(supplier);
                setFormData({
                    name: supplier.name,
                    contact: supplier.contact,
                    email: supplier.email,
                    phone: supplier.phone,
                });
                setIsFormOpen(true);
            };

            const handleDelete = (id) => {
                setSupplierToDelete(id);
                setDeleteDialogOpen(true);
            };

            const confirmDelete = () => {
                if (supplierToDelete) {
                    onDeleteSupplier(supplierToDelete);
                    setDeleteDialogOpen(false);
                    setSupplierToDelete(null);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingSupplier) {
                    onUpdateSupplier(editingSupplier.id, formData);
                } else {
                    onAddSupplier(formData);
                }
                setIsFormOpen(false);
                setEditingSupplier(null);
                setFormData({
                    name: '',
                    contact: '',
                    email: '',
                    phone: '',
                });
            };

            const getProductCount = (supplierId) => {
                return products.filter(p => p.supplierId === supplierId).length;
            };

            const canDelete = (supplierId) => {
                return getProductCount(supplierId) === 0;
            };

            return (
                <div style={{ display: 'grid', gap: '1.5rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                            <h1 style={{ fontSize: '1.875rem', fontWeight: 'bold' }}>Fornecedores</h1>
                            <p style={{ color: 'var(--muted-foreground)' }}>Gerencie seus fornecedores</p>
                        </div>
                        <button className="btn btn-primary" onClick={() => setIsFormOpen(true)}>
                            <Icons.Plus />
                            Novo Fornecedor
                        </button>
                    </div>

                    <div style={{ display: 'grid', gap: '1rem', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))' }}>
                        {suppliers.map(supplier => (
                            <div key={supplier.id} className="card">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                    <h3 style={{ fontSize: '1.125rem', fontWeight: 'bold' }}>{supplier.name}</h3>
                                    <span className="badge badge-secondary">
                                        {getProductCount(supplier.id)} produtos
                                    </span>
                                </div>
                                <div style={{ display: 'grid', gap: '0.75rem', marginBottom: '1rem' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem' }}>
                                        <Icons.Users />
                                        <span>{supplier.contact}</span>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem' }}>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <rect width="20" height="16" x="2" y="4" rx="2"/>
                                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                        </svg>
                                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{supplier.email}</span>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem' }}>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                                        </svg>
                                        <span>{supplier.phone}</span>
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem', paddingTop: '0.5rem' }}>
                                    <button
                                        className="btn btn-outline"
                                        onClick={() => handleEdit(supplier)}
                                        style={{ flex: 1, fontSize: '0.875rem' }}
                                    >
                                        <Icons.Edit />
                                        Editar
                                    </button>
                                    <button
                                        className="btn btn-outline"
                                        onClick={() => handleDelete(supplier.id)}
                                        disabled={!canDelete(supplier.id)}
                                        style={{ flex: 1, fontSize: '0.875rem', opacity: canDelete(supplier.id) ? 1 : 0.5 }}
                                    >
                                        <Icons.Trash />
                                        Excluir
                                    </button>
                                </div>
                                {!canDelete(supplier.id) && (
                                    <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.5rem' }}>
                                        Remova os produtos deste fornecedor antes de excluí-lo
                                    </p>
                                )}
                            </div>
                        ))}
                    </div>

                    {suppliers.length === 0 && (
                        <div className="card" style={{ textAlign: 'center', padding: '3rem' }}>
                            <p style={{ color: 'var(--muted-foreground)', marginBottom: '1rem' }}>Nenhum fornecedor cadastrado</p>
                            <button className="btn btn-primary" onClick={() => setIsFormOpen(true)}>
                                <Icons.Plus />
                                Adicionar Primeiro Fornecedor
                            </button>
                        </div>
                    )}

                    <Modal isOpen={isFormOpen} onClose={() => setIsFormOpen(false)} title={editingSupplier ? 'Editar Fornecedor' : 'Novo Fornecedor'}>
                        <form onSubmit={handleSubmit}>
                            <div style={{ display: 'grid', gap: '1rem' }}>
                                <div>
                                    <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: '500' }}>
                                        Nome da Empresa
                                    </label>
                                    <input
                                        type="text"
                                        className="input"
                                        value={formData.name}
                                        onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                        required
                                    />
